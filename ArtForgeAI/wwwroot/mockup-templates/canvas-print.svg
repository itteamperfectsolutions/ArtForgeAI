<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" data-product="canvas-print">
  <!-- Shadow -->
  <rect x="58" y="58" width="290" height="290" rx="2" fill="#ddd"/>
  <!-- Frame -->
  <rect x="50" y="50" width="290" height="290" rx="2" fill="#e0e0e0" stroke="#bbb" stroke-width="2"/>
  <!-- Canvas area -->
  <rect x="62" y="62" width="266" height="266" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <!-- Frame depth (3D effect) -->
  <path d="M50,50 L62,62" stroke="#d0d0d0" stroke-width="1"/>
  <path d="M340,50 L328,62" stroke="#d0d0d0" stroke-width="1"/>
  <path d="M50,340 L62,328" stroke="#d0d0d0" stroke-width="1"/>
  <path d="M340,340 L328,328" stroke="#d0d0d0" stroke-width="1"/>
  <rect class="print-zone" data-zone="front" x="72" y="72" width="246" height="246" fill="none" stroke="none"/>
</svg>
