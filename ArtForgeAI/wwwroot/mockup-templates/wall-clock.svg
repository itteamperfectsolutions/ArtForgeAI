<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" data-product="wall-clock">
  <!-- Clock face -->
  <circle cx="200" cy="200" r="170" fill="#f0f0f0" stroke="#ccc" stroke-width="3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="200" y1="45" x2="200" y2="60" stroke="#ccc" stroke-width="3"/>
  <line x1="200" y1="340" x2="200" y2="355" stroke="#ccc" stroke-width="3"/>
  <line x1="45" y1="200" x2="60" y2="200" stroke="#ccc" stroke-width="3"/>
  <line x1="340" y1="200" x2="355" y2="200" stroke="#ccc" stroke-width="3"/>
  <line x1="117" y1="57" x2="125" y2="70" stroke="#ccc" stroke-width="2"/>
  <line x1="283" y1="57" x2="275" y2="70" stroke="#ccc" stroke-width="2"/>
  <line x1="343" y1="117" x2="330" y2="125" stroke="#ccc" stroke-width="2"/>
  <line x1="343" y1="283" x2="330" y2="275" stroke="#ccc" stroke-width="2"/>
  <line x1="283" y1="343" x2="275" y2="330" stroke="#ccc" stroke-width="2"/>
  <line x1="117" y1="343" x2="125" y2="330" stroke="#ccc" stroke-width="2"/>
  <line x1="57" y1="283" x2="70" y2="275" stroke="#ccc" stroke-width="2"/>
  <line x1="57" y1="117" x2="70" y2="125" stroke="#ccc" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="200" cy="200" r="5" fill="#ccc"/>
  <rect class="print-zone" data-zone="front" x="120" y="120" width="160" height="160" fill="none" stroke="none"/>
</svg>
