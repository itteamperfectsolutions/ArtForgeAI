<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" data-product="letterhead">
  <!-- A4 proportions (scaled to fit) -->
  <rect x="80" y="20" width="240" height="360" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
  <!-- Header line -->
  <line x1="100" y1="80" x2="300" y2="80" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Faux text lines -->
  <line x1="100" y1="120" x2="280" y2="120" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="140" x2="260" y2="140" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="160" x2="270" y2="160" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="180" x2="240" y2="180" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="200" x2="280" y2="200" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="220" x2="250" y2="220" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="240" x2="270" y2="240" stroke="#eee" stroke-width="2"/>
  <line x1="100" y1="260" x2="200" y2="260" stroke="#eee" stroke-width="2"/>
  <!-- Footer line -->
  <line x1="100" y1="340" x2="300" y2="340" stroke="#e0e0e0" stroke-width="1"/>
  <rect class="print-zone" data-zone="front" x="100" y="30" width="200" height="45" fill="none" stroke="none"/>
</svg>
