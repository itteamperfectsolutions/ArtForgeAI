<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" data-product="id-badge">
  <!-- Lanyard -->
  <path d="M170,0 C170,30 140,50 140,80 L140,100" fill="none" stroke="#ddd" stroke-width="4"/>
  <path d="M230,0 C230,30 260,50 260,80 L260,100" fill="none" stroke="#ddd" stroke-width="4"/>
  <!-- Lanyard clip -->
  <rect x="175" y="95" width="50" height="15" rx="2" fill="#d0d0d0" stroke="#bbb" stroke-width="1"/>
  <!-- Badge card -->
  <rect x="115" y="110" width="170" height="260" rx="10" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
  <!-- Clip hole -->
  <circle cx="200" cy="125" r="8" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <!-- Photo placeholder -->
  <rect x="155" y="155" width="90" height="90" rx="6" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>
  <!-- Name line -->
  <line x1="145" y1="270" x2="255" y2="270" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Title line -->
  <line x1="160" y1="290" x2="240" y2="290" stroke="#eee" stroke-width="2"/>
  <!-- Barcode area -->
  <rect x="155" y="320" width="90" height="30" rx="2" fill="#e8e8e8" stroke="none"/>
  <rect class="print-zone" data-zone="front" x="135" y="145" width="130" height="110" fill="none" stroke="none"/>
</svg>
